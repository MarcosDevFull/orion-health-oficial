<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion.Health - Acesso Profissional</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="app">
        <header class="header header-curve">
            <div class="header-top-professional">
                <a href="index.html" class="back-button" aria-label="Voltar para a página inicial">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </a>
            </div>
            <div class="header-content">
                <h1>Acesso Profissional</h1>
                <p>Junte-se à nossa rede e transforme o cuidado em saúde.</p>
            </div>
        </header>

        <main class="container">
            
            <form id="login-form-prof">
                <div class="form-group">
                    <label for="login-email-prof">O SEU E-MAIL PROFISSIONAL</label>
                    <div class="input-wrapper">
                        <img src="https://api.iconify.design/mdi:email-outline.svg?color=%23888888" alt="" class="input-icon" aria-hidden="true">
                        <input type="email" id="login-email-prof" placeholder="E-mail profissional" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label for="login-password-prof">A SUA SENHA</label>
                    <div class="input-wrapper">
                         <img src="https://api.iconify.design/mdi:lock-outline.svg?color=%23888888" alt="" class="input-icon" aria-hidden="true">
                        <input type="password" id="login-password-prof" placeholder="Senha" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" id="login-button-prof" class="btn btn-primary" style="background-color: #3197b1;">Entrar</button>
                <a href="#" id="forgot-password-prof" class="form-link">Esqueceu a sua senha?</a>

                <div class="separator">
                    <span>Ou entre com a sua conta Google</span>
                </div>

                <button id="google-login-button-prof" type="button" class="btn btn-google">
                    <img src="https://api.iconify.design/logos:google-icon.svg" alt="" class="google-icon" aria-hidden="true">
                    Continuar com o Google
                </button>
                
                <p class="form-switch">Ainda não tem uma conta? <a href="#" id="show-signup-prof">Crie o seu registo profissional</a></p>
            </form>
            
            <form id="signup-form-prof" class="hidden">
                 <div class="form-group">
                    <label for="signup-name-prof">O SEU NOME COMPLETO</label>
                    <div class="input-wrapper">
                         <img src="https://api.iconify.design/mdi:account-outline.svg?color=%23888888" alt="" class="input-icon" aria-hidden="true">
                         <input type="text" id="signup-name-prof" placeholder="Nome Completo" required autocomplete="name">
                    </div>
                </div>
                <div class="form-group">
                    <label for="signup-email-prof">O SEU E-MAIL PROFISSIONAL</label>
                    <div class="input-wrapper">
                         <img src="https://api.iconify.design/mdi:email-outline.svg?color=%23888888" alt="" class="input-icon" aria-hidden="true">
                        <input type="email" id="signup-email-prof" placeholder="E-mail" required autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <label for="signup-registro-prof">NÚMERO DO REGISTO PROFISSIONAL (Ex: CRM, CRP, etc.)</label>
                    <div class="input-wrapper">
                         <img src="https://api.iconify.design/mdi:card-account-details-outline.svg?color=%23888888" alt="" class="input-icon" aria-hidden="true">
                         <input type="text" id="signup-registro-prof" placeholder="Ex: 123456/SP" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="signup-password-prof">CRIE UMA SENHA</label>
                    <div class="input-wrapper">
                        <img src="https://api.iconify.design/mdi:lock-outline.svg?color=%23888888" alt="" class="input-icon" aria-hidden="true">
                        <input type="password" id="signup-password-prof" placeholder="Senha (mínimo 6 caracteres)" required autocomplete="new-password">
                    </div>
                </div>
                 <div class="form-group">
                    <label for="signup-password-confirm-prof">CONFIRME A SUA SENHA</label>
                    <div class="input-wrapper">
                        <img src="https://api.iconify.design/mdi:lock-check-outline.svg?color=%23888888" alt="" class="input-icon" aria-hidden="true">
                        <input type="password" id="signup-password-confirm-prof" placeholder="Confirme a Senha" required autocomplete="new-password">
                    </div>
                </div>
                <button type="submit" id="signup-button-prof" class="btn btn-primary" style="background-color: #3197b1;">Criar Registo</button>
                <p class="form-switch">Já tem um registo? <a href="#" id="show-login-prof">Entrar agora</a></p>
            </form>
            
            <p id="error-message-prof" role="alert" aria-live="assertive"></p>
        </main>
        
        <footer>
             <p>
                Ao registar-se, você concorda com os <a href="#">Termos de Serviço para Profissionais</a>.
            </p>
        </footer>
    </div>

    <div id="loading-overlay-prof" class="hidden" role="status" aria-label="Carregando">
        <div class="spinner"></div>
    </div>

    <script src="professional.js" type="module"></script>
</body>
</html>
